; PlatformIO Project Configuration File
; Hybrid Radio — ESP32-S3 N16R8
; Template: https://github.com/schreibfaul1/ESP32_Arduino_ESPIDF

; =============================================================================
[common]
monitor_speed = 115200

build_flags =
    -D configTASKLIST_INCLUDE_COREID=1       ; Include CoreID in TaskList
    -D CORE_DEBUG_LEVEL=3                    ; 0 None, 1 Error, 2 Warn, 3 Info, 4 Debug, 5 Verbose
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -D ARDUINO_RUNNING_CORE=1                ; Arduino Runs On Core (setup, loop)
    -D ARDUINO_EVENT_RUNNING_CORE=1          ; Events Run On Core
    -D AUDIOTASK_CORE=0                      ; Audio task na rdzeniu 0
    -D BOARD_HAS_PSRAM=1
    -D MONITOR_SPEED=${this.monitor_speed}
    -Wall
    -Wextra
    -Wno-cpp
    -Wno-format
    -Wno-unused-function
    -Wno-missing-field-initializers
    -fdiagnostics-color=always
    -Wno-error=class-memaccess

; =============================================================================
[esp32s3]
    board_build.partitions = boards/dev-16MB.csv   ; 16MB Flash
    board = ESP32-S3-DevKitC-1-N16R8               ; 16MB Flash, 8MB octo PSRAM

; =============================================================================
[env]

; Arduino 3.3.7 / IDF 5.5.2
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip

build_flags     = ${common.build_flags}
monitor_speed   = ${common.monitor_speed}
monitor_filters = esp32_exception_decoder, send_on_enter
upload_speed    = 921600

framework = arduino, espidf

lib_deps =
    https://github.com/schreibfaul1/ESP32-audioI2S.git
    https://github.com/pu2clr/SI4735.git

custom_component_remove =
                          espressif/network_provisioning
                          espressif/esp-zboss-lib
                          espressif/esp-zigbee-lib
                          espressif/esp_rainmaker
                          espressif/rmaker_common
                          espressif/esp_insights
                          espressif/esp_diag_data_store
                          espressif/esp_diagnostics
                          espressif/cbor
                          espressif/qrcode
                          espressif/esp-sr
                          espressif/libsodium
                          espressif/esp-modbus
                          chmorgan/esp-libhelix-mp3
                          espressif/esp32-camera

; =============================================================================
[env:esp32s3]
    board = ${esp32s3.board}
    board_build.partitions = ${esp32s3.board_build.partitions}